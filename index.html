<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superkid Academy — Билет на открытый урок</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating decorations */
        .bg-decor {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .bg-decor span {
            position: absolute;
            font-size: 30px;
            opacity: 0.15;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .ticket-wrapper {
            position: relative;
            z-index: 1;
            max-width: 440px;
            width: 100%;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ticket {
            background: #fff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 0 0 1px rgba(255,255,255,0.1);
        }

        /* Top colored section */
        .ticket-header {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            padding: 32px 28px 40px;
            text-align: center;
            position: relative;
        }

        .ticket-header::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 0; right: 0;
            height: 30px;
            background: #fff;
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
        }

        .brand {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255,255,255,0.8);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 12px;
        }

        .ticket-title {
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            line-height: 1.3;
        }

        /* Perforated line */
        .perforation {
            display: flex;
            align-items: center;
            padding: 0 20px;
            margin: 4px 0;
        }
        .perf-circle-left,
        .perf-circle-right {
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            flex-shrink: 0;
        }
        .perf-circle-left { margin-left: -30px; }
        .perf-circle-right { margin-right: -30px; }
        .perf-line {
            flex: 1;
            border-top: 2px dashed #e5e7eb;
            margin: 0 12px;
        }

        /* Body */
        .ticket-body {
            padding: 20px 28px 28px;
        }

        .ticket-text {
            font-size: 15px;
            color: #4b5563;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .ticket-text strong {
            color: #1f2937;
        }

        /* Info cards */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 24px;
        }

        .info-card {
            background: #f8f7ff;
            border-radius: 14px;
            padding: 14px 16px;
            text-align: center;
        }

        .info-card .icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .info-card .label {
            font-size: 11px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .info-card .value {
            font-size: 16px;
            font-weight: 700;
            color: #1f2937;
        }

        .child-card {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            margin-bottom: 24px;
        }

        .child-card .label {
            font-size: 11px;
            color: #92400e;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .child-card .child-name {
            font-size: 22px;
            font-weight: 800;
            color: #78350f;
        }

        .parent-note {
            font-size: 13px;
            color: #9ca3af;
            text-align: center;
            margin-top: 4px;
        }

        /* Reminder */
        .reminder {
            background: #fef3c7;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 13px;
            color: #92400e;
            margin-bottom: 24px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            line-height: 1.5;
        }

        .reminder .reminder-icon {
            font-size: 18px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        /* CTA Button */
        .cta-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            font-size: 17px;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            border-radius: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(99,102,241,0.4);
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99,102,241,0.5);
        }

        .cta-btn:active {
            transform: translateY(0);
        }

        /* Error state */
        .error-state {
            text-align: center;
            padding: 40px 28px;
        }
        .error-state .error-icon { font-size: 48px; margin-bottom: 16px; }
        .error-state p { color: #6b7280; font-size: 15px; line-height: 1.6; }
    </style>
</head>
<body>
    <!-- Floating background decorations -->
    <div class="bg-decor" id="bgDecor"></div>

    <div class="ticket-wrapper">
        <div class="ticket" id="ticket">
            <!-- Filled by JS -->
        </div>
    </div>

    <script>
        // Parse URL params (decodeURIComponent handles double-encoding from messengers)
        const params = new URLSearchParams(window.location.search);
        const decode = v => { try { return v ? decodeURIComponent(v) : v; } catch(e) { return v; } };
        const child = decode(params.get('child'));
        const parent = decode(params.get('parent'));
        const date = decode(params.get('date'));
        const time = decode(params.get('time'));
        const link = decode(params.get('link'));

        const ticket = document.getElementById('ticket');

        if (!child || !date || !time || !link) {
            ticket.innerHTML = `
                <div class="error-state">
                    <div class="error-icon">🎫</div>
                    <p>Ссылка на приглашение неполная.<br>Обратитесь к менеджеру для получения корректной ссылки.</p>
                </div>
            `;
        } else {
            const parentHtml = parent
                ? `<div class="parent-note">${parent}, мы ждём вас!</div>`
                : '';

            ticket.innerHTML = `
                <div class="ticket-header">
                    <div class="brand">Superkid Academy</div>
                    <div class="ticket-title">Билет на<br>открытый урок</div>
                </div>

                <div class="perforation">
                    <div class="perf-circle-left"></div>
                    <div class="perf-line"></div>
                    <div class="perf-circle-right"></div>
                </div>

                <div class="ticket-body">
                    <p class="ticket-text">
                        Вы записаны на открытый урок по программированию для детей
                    </p>

                    <div class="info-grid">
                        <div class="info-card">
                            <div class="icon">📅</div>
                            <div class="label">Дата</div>
                            <div class="value">${date}</div>
                        </div>
                        <div class="info-card">
                            <div class="icon">🕐</div>
                            <div class="label">Время</div>
                            <div class="value">${time}</div>
                        </div>
                    </div>

                    <div class="child-card">
                        <div class="label">Ученик</div>
                        <div class="child-name">${child}</div>
                        ${parentHtml}
                    </div>

                    <div class="reminder">
                        <span class="reminder-icon">⚡</span>
                        <span>Приходите за <strong>10 минут</strong> до начала урока. Убедитесь, что у ребёнка есть компьютер с доступом в интернет.</span>
                    </div>

                    <a href="${link}" class="cta-btn" target="_blank" rel="noopener">
                        Зайти на урок →
                    </a>
                </div>
            `;
        }

        // Background floating icons
        const icons = ['⭐', '🚀', '💻', '🎮', '🧩', '🎯', '💡', '🌟'];
        const container = document.getElementById('bgDecor');
        for (let i = 0; i < 12; i++) {
            const span = document.createElement('span');
            span.textContent = icons[i % icons.length];
            span.style.left = Math.random() * 100 + '%';
            span.style.animationDuration = (8 + Math.random() * 12) + 's';
            span.style.animationDelay = (Math.random() * 10) + 's';
            span.style.fontSize = (20 + Math.random() * 20) + 'px';
            container.appendChild(span);
        }
    </script>
</body>
</html>
